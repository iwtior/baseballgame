<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pro Baseball: Pitcher Edition</title>
    <style>
        :root { --field: #1b5e20; --dirt: #795548; --line: rgba(255,255,255,0.6); }
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        #game-view {
            position: relative; width: 500px; height: 650px;
            background: linear-gradient(to bottom, #2e7d32 0%, #1b5e20 100%);
            border: 4px solid #333; cursor: none; perspective: 500px;
        }

        /* スコアボード */
        #scoreboard {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            display: flex; justify-content: space-around; z-index: 100;
            border: 1px solid #444; font-family: monospace;
        }
        .score-box { text-align: center; }
        .score-box div { font-size: 0.8rem; color: #aaa; }
        .score-box span { font-size: 1.4rem; color: #0f0; font-weight: bold; }

        /* ピッチャー（マウンド） */
        #pitcher {
            position: absolute; top: 180px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 60px; background: #ffccbc;
            border-radius: 20px 20px 5px 5px; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .windup { transform: translateX(-50%) translateY(-10px) scale(1.1); background: #ff8a65 !important; }

        /* ストライクゾーン（手前） */
        #strike-zone {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 220px; border: 3px solid var(--line);
            background: rgba(255,255,255,0.1); pointer-events: none; z-index: 5;
        }

        /* ボール */
        #ball {
            position: absolute; width: 8px; height: 8px; background: #fff;
            border-radius: 50%; display: none; transform: translate(-50%, -50%);
            z-index: 10; box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* バット（マウスカーソル） */
        #bat {
            position: absolute; width: 90px; height: 18px; 
            background: linear-gradient(to right, #5d4037, #d7ccc8, #5d4037);
            border-radius: 8px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 50; box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
        }
        .swing { transform: translate(-50%, -50%) rotate(-45deg) scaleY(0.6) !important; }

        #msg {
            position: absolute; top: 50%; width: 100%; text-align: center;
            font-size: 4rem; font-weight: bold; text-shadow: 4px 4px 0 #000;
            opacity: 0; z-index: 200; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-view">
    <div id="scoreboard">
        <div class="score-box"><div>SCORE</div><span id="score">0</span></div>
        <div class="score-box"><div>OUTS</div><span id="outs">0</span></div>
        <div class="score-box"><div>SPEED</div><span id="speed">-</span></div>
    </div>
    
    <div id="pitcher"></div>
    <div id="strike-zone"></div>
    <div id="ball"></div>
    <div id="bat"></div>
    <div id="msg">HIT!</div>
</div>

<script>
    const ballEl = document.getElementById('ball');
    const batEl = document.getElementById('bat');
    const pitcherEl = document.getElementById('pitcher');
    const msgEl = document.getElementById('msg');
    const container = document.getElementById('game-view');

    let game = {
        score: 0, outs: 0, 
        isPitching: false,
        ballX: 250, ballY: 200, ballZ: 0,
        targetX: 250, targetY: 400, // ストライクゾーン内への終着点
        vx: 0, vy: 0, vz: 0,
        mouseX: 250, mouseY: 450
    };

    // マウス操作
    container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        game.mouseX = e.clientX - rect.left;
        game.mouseY = e.clientY - rect.top;
        batEl.style.left = game.mouseX + 'px';
        batEl.style.top = game.mouseY + 'px';
    });

    function pitchSequence() {
        if (game.outs >= 3 || game.isPitching) return;
        game.isPitching = true;

        // 1. ピッチャーのセットポジション
        pitcherEl.classList.add('windup');
        
        setTimeout(() => {
            // 2. リリース（投球開始）
            pitcherEl.classList.remove('windup');
            throwBall();
        }, 800);
    }

    function throwBall() {
        game.ballZ = 0;
        game.ballX = 250; 
        game.ballY = 210;

        // ストライクゾーン(160~340, 350~570)のどこかに投げる
        game.targetX = 180 + Math.random() * 140;
        game.targetY = 370 + Math.random() * 180;
        
        const speedBase = 5 + Math.random() * 4;
        document.getElementById('speed').textContent = Math.floor(speedBase * 25) + "km";

        // 目的地までの速度計算
        game.vx = (game.targetX - game.ballX) / (150 / speedBase);
        game.vy = (game.targetY - game.ballY) / (150 / speedBase);
        game.vz = speedBase;

        ballEl.style.display = 'block';
        animate();
    }

    function animate() {
        if (!game.isPitching) return;

        game.ballZ += game.vz;
        game.ballX += game.vx;
        game.ballY += game.vy;

        const size = 6 + (game.ballZ * 0.4);
        ballEl.style.left = game.ballX + 'px';
        ballEl.style.top = game.ballY + 'px';
        ballEl.style.width = size + 'px';
        ballEl.style.height = size + 'px';

        if (game.ballZ < 155) {
            requestAnimationFrame(animate);
        } else {
            finishPlay("STRIKE");
        }
    }

    container.addEventListener('mousedown', () => {
        if (!game.isPitching || game.ballZ < 110) return;

        batEl.classList.add('swing');
        setTimeout(() => batEl.classList.remove('swing'), 150);

        // 当たり判定
        const dx = Math.abs(game.ballX - game.mouseX);
        const dy = Math.abs(game.ballY - game.mouseY);
        const timing = game.ballZ;

        game.isPitching = false;

        if (timing > 125 && timing < 150 && dx < 45 && dy < 25) {
            // 芯で捉えたか
            const power = (1 - dx/45) * (1 - dy/25);
            if (power > 0.7) {
                game.score += 1;
                finishPlay("HOMERUN!!");
            } else {
                game.score += 1;
                finishPlay("HIT!");
            }
        } else {
            finishPlay("MISS!");
        }
    });

    function finishPlay(txt) {
        game.isPitching = false;
        ballEl.style.display = 'none';
        msgEl.textContent = txt;
        msgEl.style.opacity = 1;
        
        if (txt === "MISS!" || txt === "STRIKE") {
            //
