<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pro Batting Simulator</title>
    <style>
        :root { --field-green: #2e7d32; --dirt: #8d6e63; }
        body { background: #222; color: white; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        #game-container { position: relative; width: 500px; height: 600px; background: var(--field-green); border: 5px solid #444; cursor: none; } /* カーソルを消してバットを表示 */

        /* スコアパネル */
        #hud { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; font-weight: bold; border-bottom: 2px solid #555; }
        .stat-item { text-align: center; }
        .val { color: #ffeb3b; font-size: 1.2rem; display: block; }

        /* ストライクゾーン（捕手視点） */
        #catcher-view {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 160px; height: 200px; background: rgba(0,0,0,0.2);
            border: 3px solid rgba(255,255,255,0.5); z-index: 5;
        }

        /* ボール */
        #ball {
            position: absolute; width: 10px; height: 10px; background: #fff;
            border-radius: 50%; display: none; transform: translate(-50%, -50%);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); z-index: 10;
        }

        /* バット（マウス追従） */
        #bat {
            position: absolute; width: 80px; height: 15px; background: #d7ccc8;
            border: 2px solid #5d4037; border-radius: 5px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 20;
            transition: transform 0.05s;
        }
        .swinging { transform: translate(-50%, -50%) rotate(-30deg) scaleY(0.5) !important; }

        #message {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 4rem; font-weight: bold; text-shadow: 4px 4px 0 #000;
            pointer-events: none; opacity: 0; z-index: 200;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat-item">SCORE<span id="score" class="val">0</span></div>
        <div class="stat-item">OUTS<span id="outs" class="val">0</span></div>
        <div class="stat-item">PITCH<span id="pitch-type" class="val">-</span></div>
        <div class="stat-item">SPEED<span id="speed" class="val">-</span></div>
    </div>
    
    <div id="catcher-view"></div>
    <div id="ball"></div>
    <div id="bat"></div>
    <div id="message">HIT!</div>
</div>

<p style="color: #aaa; margin-top: 10px;">マウスを動かして狙い、左クリックでスイング！</p>

<script>
    const container = document.getElementById('game-container');
    const ball = document.getElementById('ball');
    const bat = document.getElementById('bat');
    const scoreEl = document.getElementById('score');
    const outsEl = document.getElementById('outs');
    const speedEl = document.getElementById('speed');
    const pitchEl = document.getElementById('pitch-type');
    const messageEl = document.getElementById('message');

    let game = {
        score: 0, outs: 0, isPitching: false,
        bx: 250, by: 200, bz: 0, 
        vx: 0, vy: 0, vz: 0,
        batX: 250, batY: 450
    };

    // マウス移動でバットを動かす
    container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        game.batX = e.clientX - rect.left;
        game.batY = e.clientY - rect.top;
        
        // バットの位置を更新
        bat.style.left = game.batX + 'px';
        bat.style.top = game.batY + 'px';
    });

    function startPitch() {
        if (game.outs >= 3 || game.isPitching) return;
        
        game.isPitching = true;
        game.bz = 0;
        game.bx = 250; 
        game.by = 220;
        
        const types = [
            { name: 'STRAIGHT', vz: 6, vx: 0, vy: 1.5 },
            { name: 'CURVE', vz: 4, vx: 1.8, vy: 2.5 },
            { name: 'SHOOT', vz: 5, vx: -1.5, vy: 1.8 },
            { name: 'SINKER', vz: 4.5, vx: 0.5, vy: 4 }
        ];
        const type = types[Math.floor(Math.random() * types.length)];
        
        game.vx = type.vx;
        game.vy = type.vy;
        game.vz = type.vz + (Math.random() * 2);
        
        pitchEl.textContent = type.name;
        speedEl.textContent = Math.floor(game.vz * 28) + "km";
        
        ball.style.display = 'block';
        update();
    }

    function update() {
        if (!game.isPitching) return;

        game.bz += game.vz;
        game.bx += game.vx;
        game.by += game.vy;
        
        let displaySize = 10 + (game.bz * 0.3); 
        ball.style.left = game.bx + 'px';
        ball.style.top = game.by + 'px';
        ball.style.width = displaySize + 'px';
        ball.style.height = displaySize + 'px';

        if (game.bz < 150) {
            requestAnimationFrame(update);
        } else {
            finish("STRIKE");
        }
    }

    container.addEventListener('mousedown', () => {
        if (!game.isPitching || game.bz < 100) return;

        // スイングアニメーション
        bat.classList.add('swinging');
        setTimeout(() => bat.classList.remove('swinging'), 150);

        const dist = Math.sqrt(Math.pow(game.bx - game.batX, 2) + Math.pow(game.by - game.batY, 2));
        const timing = game.bz; 

        game.isPitching = false;

        // タイミング(125-145)と距離(バットの当たり判定35px以内)
        if (timing > 120 && timing < 150 && dist < 40) {
            const result = Math.random();
            if (dist < 15 && result > 0.6) {
                game.score += 1;
                finish("HOMERUN!!");
            } else if (dist < 30) {
                game.score += 1;
                finish("HIT!");
            } else {
                game.outs += 1;
                finish("OUT...");
            }
        } else {
            finish("MISS!");
        }
        
        scoreEl.textContent = game.score;
        outsEl.textContent = game.outs;
    });

    function finish(txt) {
        game.isPitching = false;
        ball.style.display = 'none';
        messageEl.textContent = txt;
        messageEl.style.opacity = 1;
        
        setTimeout(() => {
            messageEl.style.opacity = 0;
            if (game.outs >= 3) {
                alert("GAME OVER! スコア: " + game.score);
                location.reload();
            } else {
                initNext();
            }
        }, 1000);
    }

    function initNext() {
        setTimeout(startPitch, 800);
    }

    // 初球
    setTimeout(startPitch, 1500);

</script>
</body>
</html>
