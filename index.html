<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Baseball Game</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2e7d32;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #558b2f;
            border: 5px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* スコアボード */
        #scoreboard {
            background: #111;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-family: 'Courier New', Courier, monospace;
            border-bottom: 3px solid #ccc;
        }

        .stat { display: flex; flex-direction: column; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: #0f0; }

        /* フィールド */
        #field {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        #pitcher {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #ffccbc;
            border-radius: 50%;
        }

        #ball {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            display: none;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        #batter-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 10px;
            background: rgba(255,255,255,0.3);
        }

        /* メッセージ */
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* 操作パネル */
        #controls {
            margin-top: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background-color: #d32f2f;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px #9a0007;
        }

        button:active {
            box-shadow: none;
            transform: translateY(4px);
        }

        button:disabled {
            background-color: #9e9e9e;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="scoreboard">
            <div class="stat"><span>SCORE</span><span id="score" class="stat-val">0</span></div>
            <div class="stat"><span>OUT</span><span id="outs" class="stat-val">0</span></div>
            <div class="stat"><span>SPEED</span><span id="speed-display" class="stat-val">-</span></div>
        </div>

        <div id="field">
            <div id="pitcher"></div>
            <div id="ball"></div>
            <div id="batter-box"></div>
            <div id="message">HIT!</div>
        </div>

        <div id="controls">
            <button id="swing-btn">SWING!</button>
        </div>
    </div>

    <script>
        // ゲームの状態管理
        let score = 0;
        let outs = 0;
        let isPitching = false;
        let ballPos = 65;
        let ballSpeed = 0;
        let animationId;

        const ball = document.getElementById('ball');
        const swingBtn = document.getElementById('swing-btn');
        const scoreEl = document.getElementById('score');
        const outsEl = document.getElementById('outs');
        const speedEl = document.getElementById('speed-display');
        const messageEl = document.getElementById('message');

        // ピッチング開始
        function startPitch() {
            if (outs >= 3 || isPitching) return;

            isPitching = true;
            ballPos = 65;
            // 80km/h ~ 160km/h のランダムな球速
            const kmh = Math.floor(Math.random() * 81) + 80;
            speedEl.textContent = kmh + "km";
            
            // アニメーション用の速度計算
            ballSpeed = kmh / 15; 
            ball.style.display = 'block';
            ball.style.top = ballPos + 'px';
            
            animateBall();
        }

        // ボールを動かす
        function animateBall() {
            ballPos += ballSpeed;
            ball.style.top = ballPos + 'px';

            if (ballPos < 450) {
                animationId = requestAnimationFrame(animateBall);
            } else {
                // 見逃し三振またはボール
                showMessage("STRIKE!");
                resetBall();
            }
        }

        // スイング判定
        function swing() {
            if (!isPitching) return;
            
            cancelAnimationFrame(animationId);
            
            // 打点の判定 (260px ~ 290px がジャストミート)
            const hitZone = ballPos;
            
            if (hitZone >= 250 && hitZone <= 310) {
                // ヒット判定
                const rand = Math.random();
                if (rand > 0.7) {
                    showMessage("HOMERUN!!");
                    score += 1;
                } else if (rand > 0.3) {
                    showMessage("HIT!");
                    score += 1;
                } else {
                    showMessage("OUT...");
                    outs += 1;
                }
            } else {
                showMessage("MISS!");
                // 空振りの場合はストライク（このゲームでは簡易的にカウントせず演出のみ、またはアウトに加算もアリ）
            }

            updateScoreboard();
            resetBall();
        }

        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.style.opacity = 1;
            setTimeout(() => {
                messageEl.style.opacity = 0;
            }, 800);
        }

        function resetBall() {
            isPitching = false;
            ball.style.display = 'none';
            
            if (outs >= 3) {
                setTimeout(() => {
                    alert("GAME OVER! スコア: " + score);
                    location.reload();
                }, 1000);
            } else {
                // 次の投球まで少し待つ
                setTimeout(startPitch, 1500);
            }
        }

        function updateScoreboard() {
            scoreEl.textContent = score;
            outsEl.textContent = outs;
        }

        // イベントリスナー
        swingBtn.addEventListener('mousedown', swing);
        // キーボード操作（スペースキーでも打てるように）
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") swing();
        });

        // 最初の投球
        setTimeout(startPitch, 1000);

    </script>
</body>
</html>
