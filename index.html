<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Baseball JS</title>
    <style>
        :root { --field-green: #1b5e20; --dirt-brown: #795548; }
        body { background: #333; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        #game-container { position: relative; width: 400px; height: 600px; background: var(--field-green); border: 4px solid #555; overflow: hidden; }
        
        /* 遠近感のあるマウンドとホーム */
        #infield {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 600px; height: 400px; background: var(--dirt-brown);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        /* スコアボード */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
            display: grid; grid-template-columns: 1fr 1fr; font-size: 14px; z-index: 10;
        }

        /* ボール（擬似3D） */
        #ball {
            position: absolute; width: 8px; height: 8px; background: #fff;
            border-radius: 50%; display: none; transform: translate(-50%, -50%);
            box-shadow: inset -2px -2px 2px rgba(0,0,0,0.2); z-index: 5;
        }

        /* バッターボックス目安 */
        #strike-zone {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 100px; border: 2px dashed rgba(255,255,255,0.3);
        }

        #message {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 3rem; font-weight: bold; text-shadow: 3px 3px 0 #000;
            pointer-events: none; opacity: 0; z-index: 20;
        }

        #controls { margin-top: 15px; }
        button {
            padding: 15px 50px; font-size: 1.5rem; cursor: pointer;
            background: #ff9800; border: none; border-radius: 5px; color: white;
            box-shadow: 0 5px #e65100; font-weight: bold;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px #e65100; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>OUTS: <span id="outs">0</span></div>
        <div>PITCH: <span id="pitch-type">-</span></div>
        <div>SPEED: <span id="speed">-</span></div>
    </div>
    
    <div id="infield"></div>
    <div id="strike-zone"></div>
    <div id="ball"></div>
    <div id="message">HIT!</div>
</div>

<div id="controls">
    <button id="swing-btn">SWING</button>
</div>

<script>
    const ball = document.getElementById('ball');
    const scoreEl = document.getElementById('score');
    const outsEl = document.getElementById('outs');
    const speedEl = document.getElementById('speed');
    const pitchEl = document.getElementById('pitch-type');
    const messageEl = document.getElementById('message');
    const swingBtn = document.getElementById('swing-btn');

    let state = {
        score: 0, outs: 0, 
        isPitching: false,
        x: 200, y: 150, z: 0, // zを奥行きとして使用
        vx: 0, vy: 0, vz: 0,
        ballSize: 8
    };

    function initPitch() {
        if (state.outs >= 3 || state.isPitching) return;
        
        state.isPitching = true;
        state.z = 0;
        state.x = 200;
        state.y = 180;
        
        // 球速と球種の設定
        const types = [
            { name: 'STRAIGHT', vz: 5, vx: 0 },
            { name: 'CURVE', vz: 3.5, vx: 1.5 },
            { name: 'SHOOT', vz: 4, vx: -1.2 }
        ];
        const type = types[Math.floor(Math.random() * types.length)];
        
        state.vz = type.vz + Math.random() * 2;
        state.vx = type.vx;
        state.vy = 2.5; // 重力・軌道の影響
        
        pitchEl.textContent = type.name;
        speedEl.textContent = Math.floor(state.vz * 30) + "km";
        
        ball.style.display = 'block';
        updateBallFrame();
    }

    function updateBallFrame() {
        if (!state.isPitching) return;

        state.z += state.vz;
        state.x += state.vx;
        state.y += state.vy;
        
        // 遠近感の表現
        state.ballSize = 8 + (state.z * 0.15); 
        
        ball.style.left = state.x + 'px';
        ball.style.top = state.y + 'px';
        ball.style.width = state.ballSize + 'px';
        ball.style.height = state.ballSize + 'px';

        if (state.z < 150) {
            requestAnimationFrame(updateBallFrame);
        } else {
            finishPlay("STRIKE");
        }
    }

    function swing() {
        if (!state.isPitching || state.z < 80) return; // あまりに早すぎると空振り

        const timing = state.z; // 120-140あたりがジャストミート
        const accuracy = Math.abs(state.x - 200);

        state.isPitching = false;

        if (timing > 115 && timing < 145 && accuracy < 30) {
            const power = Math.random();
            if (power > 0.8) {
                state.score += 1;
                finishPlay("HOMERUN!!");
            } else if (power > 0.3) {
                state.score += 1;
                finishPlay("HIT!");
            } else {
                state.outs += 1;
                finishPlay("OUT...");
            }
        } else {
            finishPlay("MISS!");
        }
        
        updateHUD();
    }

    function finishPlay(txt) {
        state.isPitching = false;
        ball.style.display = 'none';
        messageEl.textContent = txt;
        messageEl.style.opacity = 1;
        
        setTimeout(() => {
            messageEl.style.opacity = 0;
            if (state.outs >= 3) {
                alert("GAME OVER! SCORE: " + state.score);
                location.reload();
            } else {
                initPitch();
            }
        }, 1200);
    }

    function updateHUD() {
        scoreEl.textContent = state.score;
        outsEl.textContent = state.outs;
    }

    swingBtn.addEventListener('mousedown', swing);
    window.addEventListener('keydown', (e) => { if(e.code === "Space") swing(); });

    // 開始
    setTimeout(initPitch, 1000);
</script>
</body>
</html>
